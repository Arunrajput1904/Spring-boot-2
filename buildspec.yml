version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17

  build:
    commands:
      - echo Build started...
      - chmod +x mvnw
      - ./mvnw clean package -DskipTests

  post_build:
    commands:
      - echo Build completed successfully

artifacts:
  files:
    - target/*.jar
  discard-paths: yes

cache:
  paths:
    - /root/.m2/**/*