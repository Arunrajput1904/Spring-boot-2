version: 0.2

phases:
  install:
    commands:
      - echo Installing Java 21
      - apt-get update
      - apt-get install -y openjdk-21-jdk
      - export JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64
      - export PATH=$JAVA_HOME/bin:$PATH
      - java -version

  build:
    commands:
      - chmod +x mvnw
#      - ./mvnw clean package -DskipTests

artifacts:
  files:
    - target/*.jar