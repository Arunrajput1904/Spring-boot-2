version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto21
    commands:
      - echo Installing dependencies...

  pre_build:
    commands:
      - echo Pre-build phase started...

  build:
    commands:
      - echo Build started...
      - mvn clean package -DskipTests

  post_build:
    commands:
      - echo Build completed successfully

artifacts:
  files:
    - target/*.jar
  discard-paths: yes

cache:
  paths:
    - /root/.m2/**/*